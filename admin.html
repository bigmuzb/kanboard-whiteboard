<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold" id="admin-title">Board Admin</h1>
        <p class="text-slate-400">Users, magic links, sessions, and activity</p>
      </div>
      <a href="/" class="px-4 py-2 rounded bg-slate-800 hover:bg-slate-700">Back to board</a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <section class="bg-slate-900 rounded-xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Users</h2>
          <button id="refresh-users" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500">Refresh</button>
        </div>
        <div id="users" class="space-y-3 text-sm"></div>
      </section>

      <section class="bg-slate-900 rounded-xl border border-slate-800 p-5">
        <h2 class="text-xl font-semibold mb-4">Create Magic Link</h2>
        <form id="link-form" class="space-y-3">
          <div>
            <label class="block text-xs text-slate-400 mb-1">User</label>
            <select id="link-user" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2"></select>
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Label (e.g. "Site tablet", "Office TV")</label>
            <input id="link-label" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" placeholder="Label" />
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-1">Expires after (days) — 0 = never</label>
            <input id="link-expiry" type="number" value="0" min="0" max="365" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2" />
          </div>
          <button class="w-full px-4 py-2 rounded bg-emerald-600 hover:bg-emerald-500">Generate Link</button>
        </form>
        <div id="new-link" class="mt-4 text-sm break-all text-emerald-300"></div>
      </section>

      <section class="bg-slate-900 rounded-xl border border-slate-800 p-5 lg:col-span-2">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Magic Links</h2>
          <button id="refresh-links" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500">Refresh</button>
        </div>
        <div id="links" class="space-y-2 text-sm"></div>
      </section>

      <section class="bg-slate-900 rounded-xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Active Sessions</h2>
          <button id="refresh-sessions" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500">Refresh</button>
        </div>
        <div id="sessions" class="space-y-2 text-sm"></div>
      </section>

      <section class="bg-slate-900 rounded-xl border border-slate-800 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold">Activity</h2>
          <button id="refresh-activity" class="px-3 py-1 rounded bg-blue-600 hover:bg-blue-500">Refresh</button>
        </div>
        <div id="activity" class="space-y-2 text-sm"></div>
      </section>
    </div>
  </div>

  <script>
    async function getJson(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadUsers() {
      const { users } = await getJson('/admin/api/users');
      const el = document.getElementById('users');
      const sel = document.getElementById('link-user');
      sel.innerHTML = users.map(u => `<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
      el.innerHTML = users.map(u => `
        <div class="rounded border border-slate-800 p-3 bg-slate-950/60">
          <div class="font-medium">${u.name}</div>
          <div class="text-slate-400">Kanboard: ${u.kanboard_user_id} · Role: ${u.role} · Active: ${u.is_active ? 'yes' : 'no'}</div>
          <div class="text-slate-500">Projects: ${u.allowed_projects}</div>
        </div>`).join('');
    }

    async function loadLinks() {
      const { links } = await getJson('/admin/api/links');
      document.getElementById('links').innerHTML = links.map(l => `
        <div class="rounded border border-slate-800 p-3 bg-slate-950/60 flex items-center justify-between gap-3">
          <div>
            <div class="font-medium">${l.user_name}</div>
            <div class="text-slate-400">${l.label || 'No label'} · Expires ${l.expires_at}${l.used_at ? ' · Used ' + l.used_at : ''}</div>
          </div>
          <button data-id="${l.id}" class="revoke-link px-3 py-1 rounded bg-rose-700 hover:bg-rose-600">Revoke</button>
        </div>`).join('');
      document.querySelectorAll('.revoke-link').forEach(btn => btn.onclick = async () => {
        await getJson(`/admin/api/links/${btn.dataset.id}/revoke`, { method: 'POST' });
        loadLinks();
      });
    }

    async function loadSessions() {
      const { sessions } = await getJson('/admin/api/sessions');
      document.getElementById('sessions').innerHTML = sessions.map(s => `
        <div class="rounded border border-slate-800 p-3 bg-slate-950/60 flex items-center justify-between gap-3">
          <div>
            <div class="font-medium">${s.user_name}</div>
            <div class="text-slate-400">Last active ${s.last_active}</div>
            <div class="text-slate-500 break-all">${s.user_agent || 'Unknown agent'}</div>
          </div>
          <button data-id="${s.id}" class="revoke-session px-3 py-1 rounded bg-rose-700 hover:bg-rose-600">Revoke</button>
        </div>`).join('');
      document.querySelectorAll('.revoke-session').forEach(btn => btn.onclick = async () => {
        await getJson(`/admin/api/sessions/${btn.dataset.id}/revoke`, { method: 'POST' });
        loadSessions();
      });
    }

    async function loadActivity() {
      const { activity } = await getJson('/admin/api/activity?limit=50');
      document.getElementById('activity').innerHTML = activity.map(a => `
        <div class="rounded border border-slate-800 p-3 bg-slate-950/60">
          <div class="font-medium">${a.action}</div>
          <div class="text-slate-400">${a.user_name || 'system'} · ${a.created_at}</div>
          <div class="text-slate-500">${a.detail || ''}</div>
        </div>`).join('');
    }

    document.getElementById('link-form').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        user_id: Number(document.getElementById('link-user').value),
        label: document.getElementById('link-label').value,
        expiry_days: Number(document.getElementById('link-expiry').value || 30)
      };
      const { link } = await getJson('/admin/api/links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const loginUrl = `${location.origin}/auth/login?token=${link.token}`;
      document.getElementById('new-link').innerHTML = `<div class="font-medium mb-1">New magic link</div><a class="underline" href="${loginUrl}">${loginUrl}</a>`;
      loadLinks();
    };

    document.getElementById('refresh-users').onclick = loadUsers;
    document.getElementById('refresh-links').onclick = loadLinks;
    document.getElementById('refresh-sessions').onclick = loadSessions;
    document.getElementById('refresh-activity').onclick = loadActivity;

    Promise.all([loadUsers(), loadLinks(), loadSessions(), loadActivity()]);
  </script>
  <script src="config.js?v=20260505-notool-brand"></script>
  <script>
    document.title = CONFIG.BRAND_NAME + ' Board Admin';
    document.getElementById('admin-title').textContent = CONFIG.BRAND_NAME + ' Board Admin';
  </script>
</body>
</html>
